name: CI
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # setup sccache for Rust; see https://github.com/Mozilla-Actions/sccache-action
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
jobs:
  check_project_files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--cache --max-cache-age 1d . -v *.md"
          failIfEmpty: false

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ github.workflow }}"

      - uses: mozilla-actions/sccache-action@v0.0.10

      - run: rustup default stable
      - run: rustup component add rustfmt clippy

      - run: cargo verify-project

      - name: Detect unused dependencies
        uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2

      - run: cargo fmt --check --all
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo check --workspace --future-incompat-report
      - run: cargo doc --no-deps --workspace --document-private-items
      - run: cargo build --workspace --verbose
      # can't run with --benches since iai-callgrind require iai-callgrind-runner exists
      - run: cargo test --workspace --verbose
